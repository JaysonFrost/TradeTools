version: 2
updates:
  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    labels:
      - dependencies
