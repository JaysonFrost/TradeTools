name: CI

on:
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "desktop/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
