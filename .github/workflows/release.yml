name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            script: npm run dist:win
          - name: macos
            os: macos-latest
            script: npm run dist:mac

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build release package
        run: ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeTools-${{ matrix.name }}
          if-no-files-found: error
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.blockmap
            desktop/dist/latest*.yml

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare checksums
        id: assets
        shell: bash
        run: |
          mapfile -d '' ASSETS < <(find release-assets -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.blockmap' -o -name 'latest*.yml' \) -print0 | sort -z)

          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          sha256sum "${ASSETS[@]}" > SHA256SUMS.txt

          {
            echo "files<<EOF"
            printf '%s\n' "${ASSETS[@]}"
            echo "SHA256SUMS.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          RELEASE_FILES: ${{ steps.assets.outputs.files }}
        run: |
          mapfile -t ASSETS <<< "$RELEASE_FILES"

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${ASSETS[@]}" --repo "$GH_REPO" --title "TradeTools $RELEASE_TAG" --generate-notes
          fi
